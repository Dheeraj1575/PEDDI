    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #0a0a0a; color: #fff; font-family: 'Montserrat', sans-serif; }

        /* ===== HEADER ===== */
        .videos-header {
            position: sticky;
            top: 0;
            z-index: 900;
            background: rgba(10,10,10,0.97);
            border-bottom: 1px solid rgba(196, 135, 42, 0.25);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            height: 64px;
        }
        .back-home-link {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #fff;
            font-size: 0.9rem;
            font-weight: 600;
            text-decoration: none;
            letter-spacing: 0.04em;
            transition: color 0.2s;
        }
        .back-home-link:hover { color: #C4872A; }
        .videos-header-logo {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.8rem;
            color: #C4872A;
            letter-spacing: 0.1em;
        }
        .header-spacer { width: 120px; }

        /* ===== BODY ===== */
        .videos-page-body {
            max-width: 1320px;
            margin: 0 auto;
            padding: 60px 40px 100px;
        }
        .videos-page-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(2.5rem, 6vw, 4rem);
            text-align: center;
            letter-spacing: 0.08em;
            color: #fff;
            margin-bottom: 6px;
        }
        .videos-page-divider {
            width: 60px;
            height: 3px;
            background: #C4872A;
            margin: 0 auto 30px;
            border-radius: 2px;
        }

        /* ===== TABS ===== */
        .videos-tabs {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 50px;
            flex-wrap: wrap;
        }
        .video-tab-btn {
            padding: 10px 20px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(196, 135, 42, 0.3);
            color: #aaa;
            font-size: 0.9rem;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
            letter-spacing: 0.03em;
        }
        .video-tab-btn:hover {
            border-color: #C4872A;
            color: #C4872A;
            background: rgba(196, 135, 42, 0.1);
        }
        .video-tab-btn.active {
            background: #C4872A;
            border-color: #C4872A;
            color: #000;
        }

        /* ===== GRID ===== */
        .videos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
        }
        .video-card {
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid rgba(196, 135, 42, 0.4);
            transition: all 0.3s ease;
            background: linear-gradient(135deg, rgba(196, 135, 42, 0.1), transparent);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
        }
        .video-card:hover {
            border-color: #C4872A;
            box-shadow: 0 15px 40px rgba(196, 135, 42, 0.4);
            transform: translateY(-8px) scale(1.02);
        }
        .video-title-bar {
            padding: 14px 16px;
            background: rgba(196, 135, 42, 0.15);
            border-bottom: 2px solid rgba(196, 135, 42, 0.25);
            display: flex;
            align-items: center;
            gap: 10px;
            min-height: 56px;
        }
        .video-title-bar::before {
            content: '▶';
            color: #C4872A;
            font-size: 12px;
            flex-shrink: 0;
            font-weight: bold;
        }
        .video-title-bar p {
            font-size: 0.9rem;
            font-weight: 600;
            color: #fff;
            line-height: 1.3;
            margin: 0;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .video-player-wrap {
            position: relative;
            width: 100%;
            aspect-ratio: 16/9;
            background: #1a1a1a;
            overflow: hidden;
        }
        .video-player-wrap iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .video-thumbnail-fallback {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            display: none;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 10;
        }
        .video-thumbnail-fallback.visible {
            display: flex;
        }
        .play-button-fallback {
            width: 70px;
            height: 70px;
            background: rgba(196, 135, 42, 0.9);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #000;
            font-size: 28px;
            box-shadow: 0 0 30px rgba(196, 135, 42, 0.8);
            transition: all 0.3s;
        }
        .video-thumbnail-fallback:hover .play-button-fallback {
            transform: scale(1.2);
            background: #C4872A;
            box-shadow: 0 0 40px rgba(196, 135, 42, 1);
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 1024px) {
            .videos-grid {
                grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
                gap: 20px;

        }
        @media (max-width: 768px) {

            }
            .videos-grid {
                grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
                gap: 16px;
            }
            .videos-tabs {
                gap: 10px;
            }
            .video-tab-btn {
                padding: 8px 16px;
                font-size: 0.85rem;
            }
            .video-title-bar {
                padding: 12px 14px;
                min-height: 52px;
            }

                font-size: 0.8rem;
            }
            .play-button {
                width: 48px;
                height: 48px;
                font-size: 18px;
            }
        }
        @media (max-width: 480px) {
            .videos-header {
                padding: 0 20px;
            }
            .videos-grid {
                grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
                gap: 12px;
            }
            .video-title-bar {
                padding: 10px 12px;
                min-height: 48px;
            }
            .video-title-bar p {
                font-size: 0.7rem;
            }
            .play-button {
                width: 40px;
                height: 40px;
                font-size: 14px;
            }
        }

</head>

        let currentFilter = 'all';

        /* ===== RENDER VIDEOS ===== */
        function renderVideos(filter = 'all') {
            const grid = document.getElementById('videosGrid');
            grid.innerHTML = '';

            let filtered = filter === 'all' 
                ? videosData 
                : videosData.filter(v => v.category === filter);
            
            // Deduplicate by videoId in "All" view
            if (filter === 'all') {
                const seenVideoIds = new Set();
                filtered = filtered.filter(v => {
                    if (seenVideoIds.has(v.videoId)) {
                        return false;
                    }
                    seenVideoIds.add(v.videoId);
                    return true;
                });
            }

            filtered.forEach(video => {
                const card = document.createElement('div');
                card.className = 'video-card';
                const thumbnailUrl = `https://img.youtube.com/vi/${video.videoId}/hqdefault.jpg`;
                
                card.innerHTML = `
                    <div class="video-title-bar">
                        <p>${video.title}</p>
                    </div>
                    <div class="video-player-wrap">
                        <div class="video-thumbnail-fallback" style="background-image: url('${thumbnailUrl}');" data-video-id="${video.videoId}" data-title="${video.title}">
                            <div class="play-button-fallback">
                                <i class="fas fa-play"></i>
                            </div>
                        </div>
                        <iframe 
                            width="100%"
                            height="100%"
                            src="https://www.youtube.com/embed/${video.videoId}"
                            title="${video.title}"
                            frameborder="0"
                            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                            referrerpolicy="strict-origin-when-cross-origin"
                            allowfullscreen
                            data-video-id="${video.videoId}">
                        </iframe>
                    </div>
                `;

                const wrapper = card.querySelector('.video-player-wrap');
                const fallback = card.querySelector('.video-thumbnail-fallback');
                const iframe = card.querySelector('iframe');

                // Click fallback to open on YouTube
                fallback.addEventListener('click', function(e) {
                    e.preventDefault();
                    window.open(`https://www.youtube.com/watch?v=${video.videoId}`, '_blank');
                });

                // Detect if iframe fails to load
                setTimeout(() => {
                    try {
                        const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
                        if (!iframeDoc || iframeDoc.body.innerHTML.includes('unavailable') || iframeDoc.body.innerHTML.includes('This video') === false) {
                            // Try to detect unavailable state
                            fallback.classList.add('visible');
                            iframe.style.display = 'none';
                        }
                    } catch(e) {
                        // Cross-origin restriction or other error - show fallback
                        fallback.classList.add('visible');
                        iframe.style.display = 'none';
                    }
                }, 2000);

                grid.appendChild(card);
            });
        }

        /* ===== FILTER VIDEOS ===== */
        function filterVideos(category) {
            currentFilter = category;
            
            // Update active tab
            document.querySelectorAll('.video-tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.closest('.video-tab-btn').classList.add('active');

            renderVideos(category);
        }

        // Initialize
        renderVideos('all');
